# importing modules
source = ~/.config/hypr/modules/monitors.conf
source = ~/.config/hypr/modules/autostart.conf
source = ~/.config/hypr/modules/variables.conf
source = ~/.config/hypr/modules/lookandfeel.conf
source = ~/.config/hypr/modules/inputs.conf
source = ~/.config/hypr/modules/workspaces.conf

#====[Programs]====#

$terminal = kitty
$fileManager = dolphin
; $fileManager = nautilus
; $fileManager = thunar

#====[Binds]====#

$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, SPACE, layoutmsg, togglesplit
bind = $mainMod, TAB, workspace, e+1
bind = $mainMod, B, exec, xdg-open https://

# Custom keybinds for Ambxsts

bind = $mainMod, A, exec, ambxst run assistant
bind = $mainMod, L, exec, ambxst run lockscreen
bind = $mainMod, V, exec, ambxst run clipboard
bind = $mainMod, S, exec, ambxst run tools
bind = $mainMod, COMMA, exec, ambxst run wallpapers
bind = $mainMod, ESCAPE, exec, ambxst run powermenu
bind = $mainMod, PERIOD, exec, ambxst run emoji
bind = $mainMod, Super_L, exec, ambxst run dashboard
bind = $mainMod SHIFT, S, exec, ambxst run screenshot
bind = $mainMod SHIFT, R, exec, ambxst run screenrecord
bind = $mainMod SHIFT, A, exec, ambxst run lens
bind = $mainMod SHIFT, C, exec, hyprpicker -a --notify --disable-preview --scale=10 --radius=40
bind = ALT, SPACE, exec, ambxst run launcher

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# move windows with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize windows with mainMod + CTRL + arrow keys
bind = $mainMod CTRL, left, resizeactive, -40 0
bind = $mainMod CTRL, right, resizeactive, 40 0
bind = $mainMod CTRL, up, resizeactive, 0 -40
bind = $mainMod CTRL, down, resizeactive, 0 40

# Workspace management
bind = $mainMod, T, togglegroup
bind = $mainMod, bracketright, changegroupactive, f
bind = $mainMod, bracketleft, changegroupactive, b

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, Z, togglespecialworkspace, magic
bind = $mainMod SHIFT, Z, movetoworkspace, special:magic
bind = $mainMod SHIFT, RETURN, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# playerctl controls
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bind = ALT,PERIOD, exec, playerctl next
bind = ALT,COMMA, exec, playerctl previous

# macro keybinds for scripts
bind = $mainMod CTRL, F24, exec, ~/.local/bin/scripts/custom_touchpad.sh
bindl = ,XF86Tools, exec, ~/.local/bin/scripts/custom_refresh.sh

# open hyprland configs in code editor.
bind = $mainMod, I, exec, zeditor ~/.config/hypr/
